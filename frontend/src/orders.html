<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopora – My Orders</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .orders-page { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .page-subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 28px; }

    /* FILTER TABS */
    .status-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 0.825rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .tab:hover { border-color: var(--primary); color: var(--primary); }
    .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* ORDER CARDS */
    .orders-list { display: flex; flex-direction: column; gap: 16px; }

    .order-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: box-shadow 0.2s; }
    .order-card:hover { box-shadow: var(--shadow-hover); }

    .order-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .order-header-left { display: flex; flex-direction: column; gap: 4px; }
    .order-number { font-weight: 800; font-size: 0.95rem; }
    .order-date { font-size: 0.78rem; color: var(--text-muted); }
    .order-header-right { display: flex; align-items: center; gap: 16px; }
    .order-total { font-size: 1rem; font-weight: 800; color: var(--primary); }

    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .status-pending   { background: #fef9c3; color: #ca8a04; }
    .status-confirmed { background: #dbeafe; color: #1d4ed8; }
    .status-shipped   { background: #e0e7ff; color: #4f46e5; }
    .status-delivered { background: #dcfce7; color: #16a34a; }
    .status-cancelled { background: #fee2e2; color: #dc2626; }

    .expand-icon { color: var(--text-muted); font-size: 0.8rem; transition: transform 0.2s; }
    .expand-icon.open { transform: rotate(180deg); }

    /* ORDER BODY */
    .order-body { display: none; padding: 20px; }
    .order-body.open { display: block; }

    .order-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .order-item { display: flex; align-items: center; gap: 14px; padding: 12px; background: var(--bg); border-radius: 10px; }
    .order-item-img { width: 48px; height: 48px; background: var(--primary-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .order-item-info { flex: 1; }
    .order-item-name { font-size: 0.875rem; font-weight: 600; }
    .order-item-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .order-item-price { font-size: 0.875rem; font-weight: 700; color: var(--primary); }

    .order-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .order-detail-block h4 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 6px; }
    .order-detail-block p { font-size: 0.85rem; color: var(--text); line-height: 1.5; }

    /* EMPTY / LOADING */
    .loading-state { text-align: center; padding: 60px; color: var(--text-muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 80px 24px; background: white; border-radius: var(--radius); box-shadow: var(--shadow); }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 14px; }
    .empty-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 20px; }

    .not-logged-in { text-align: center; padding: 80px 24px; background: white; border-radius: var(--radius); box-shadow: var(--shadow); }
    .not-logged-in .icon { font-size: 3rem; margin-bottom: 14px; }
    .not-logged-in h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .not-logged-in p { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 20px; }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .btn-primary:hover { background: var(--primary-dark); }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Shop<span>ora</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Shop</a></li>
      <li><a href="orders.html" class="active">My Orders</a></li>
      <li><a href="categories.html">Categories</a></li>
    </ul>
    <div class="nav-actions">
      <button class="cart-btn" onclick="openCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="profile-btn" id="profileBtn" onclick="openProfileModal()"></button>
      <button class="login-btn" id="loginBtn" onclick="openLoginModal()">Sign In</button>
    </div>
  </div>
</nav>

<div id="pageContent"></div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="modal-close" onclick="closeLoginModal()">✕</button>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in with your email address</p>
    <div class="modal-error" id="loginError"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" onkeydown="if(event.key==='Enter') submitLogin()" />
    </div>
    <button class="modal-submit" onclick="submitLogin()">Sign In</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <button class="modal-close" onclick="closeProfileModal()">✕</button>
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <h3 id="profileName"></h3>
        <p id="profileEmail"></p>
      </div>
    </div>
    <ul class="profile-menu">
      <li><a href="orders.html">📦 My Orders</a></li>
      <li><a href="profile.html">⚙️ My Profile</a></li>
      <li><button class="logout-btn" onclick="logout()">🚪 Sign Out</button></li>
    </ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/common.js" defer></script>
<script src="js/orders.js" defer></script>
</body>
</html>
