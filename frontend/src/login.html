<h2>Login</h2>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required />
  <button type="submit">Login</button>
</form>
<div id="loginMsg"></div>

<script>
const BASE_URL = "http://localhost:5100/api";

document.getElementById("loginForm").onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();

  try {
    const res = await fetch(`${BASE_URL}/users/email/${encodeURIComponent(email)}`);
    if (!res.ok) {
      document.getElementById("loginMsg").textContent = "❌ User not found.";
      return;
    }

    const user = await res.json();
    localStorage.setItem("shopora_user", JSON.stringify(user));
    document.getElementById("loginMsg").textContent = "✅ Logged in!";
    setTimeout(() => window.location.href = "index.html", 800);
  } catch {
    document.getElementById("loginMsg").textContent = "❌ Error, try again.";
  }
};
</script>
