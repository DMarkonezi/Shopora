<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopora – Cart</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .cart-page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; }

    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }

    /* CART ITEMS */
    .cart-items { display: flex; flex-direction: column; gap: 12px; }
    .cart-item { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 20px; }
    .cart-item-img { width: 80px; height: 80px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 0.875rem; color: var(--text-muted); }
    .cart-item-controls { display: flex; align-items: center; gap: 12px; }
    .qty-control { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .qty-control button { background: none; border: none; padding: 6px 12px; cursor: pointer; font-size: 1rem; font-weight: 700; color: var(--primary); transition: background 0.2s; }
    .qty-control button:hover { background: var(--primary-light); }
    .qty-control span { padding: 6px 14px; font-weight: 600; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-width: 40px; text-align: center; }
    .item-total { font-size: 1rem; font-weight: 800; color: var(--primary); min-width: 70px; text-align: right; }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; padding: 4px; border-radius: 6px; transition: all 0.2s; }
    .remove-btn:hover { background: #fee2e2; color: #dc2626; }

    /* SUMMARY */
    .cart-summary { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); position: sticky; top: 88px; }
    .cart-summary h3 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .summary-row { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 10px; color: var(--text-muted); }
    .summary-row.total { font-size: 1.05rem; font-weight: 800; color: var(--text); padding-top: 12px; border-top: 1px solid var(--border); margin-top: 4px; }
    .summary-row.total span:last-child { color: var(--primary); }
    .checkout-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
    .checkout-btn:hover { background: var(--primary-dark); }
    .continue-btn { width: 100%; background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 10px; border-radius: 10px; font-size: 0.875rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .continue-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* EMPTY */
    .empty-cart { text-align: center; padding: 80px 24px; background: white; border-radius: var(--radius); box-shadow: var(--shadow); }
    .empty-cart .icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-cart h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .empty-cart p { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 24px; }
    .shop-btn { background: var(--primary); color: white; border: none; padding: 12px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
    .shop-btn:hover { background: var(--primary-dark); }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Shop<span>ora</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Shop</a></li>
      <li><a href="orders.html">My Orders</a></li>
      <li><a href="categories.html">Categories</a></li>
    </ul>
    <div class="nav-actions">
      <button class="cart-btn" onclick="openCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="profile-btn" id="profileBtn" onclick="openProfileModal()"></button>
      <button class="login-btn" id="loginBtn" onclick="openLoginModal()">Sign In</button>
    </div>
  </div>
</nav>

<div class="cart-page">
  <h1 class="page-title">🛒 Your Cart</h1>
  <div id="cartContent"></div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="modal-close" onclick="closeLoginModal()">×</button>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in with your email address</p>
    <div class="modal-error" id="loginError"></div>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com"
             onkeydown="if(event.key==='Enter') submitLogin()" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password"
             onkeydown="if(event.key==='Enter') submitLogin()" />
    </div>

    <button class="modal-submit" onclick="submitLogin()">Sign In</button>

    <p>Don't have an account? <a href="register.html">Register</a></p>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <button class="modal-close" onclick="closeProfileModal()">✕</button>
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <h3 id="profileName"></h3>
        <p id="profileEmail"></p>
      </div>
    </div>
    <ul class="profile-menu">
      <li><a href="orders.html">📦 My Orders</a></li>
      <li><a href="profile.html">⚙️ My Profile</a></li>
      <li><button class="logout-btn" onclick="logout()">🚪 Sign Out</button></li>
    </ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/common.js" defer></script>
<script src="js/cart.js" defer></script>
</body>
</html>
