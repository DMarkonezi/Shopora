<h2>Register</h2>
<form id="registerForm">
  <input type="text" id="firstName" placeholder="First Name" required />
  <input type="text" id="lastName" placeholder="Last Name" required />
  <input type="email" id="email" placeholder="Email" required />
  <input type="password" id="password" placeholder="Password" required />
  <button type="submit">Register</button>
</form>
<div id="registerMsg"></div>

<script>
const BASE_URL = "http://localhost:5100/api";

document.getElementById("registerForm").onsubmit = async (e) => {
  e.preventDefault();
  const user = {
    firstName: document.getElementById("firstName").value.trim(),
    lastName: document.getElementById("lastName").value.trim(),
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value
  };

  try {
    const res = await fetch(`${BASE_URL}/users`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(user)
    });
    if (!res.ok) {
      const err = await res.text();
      document.getElementById("registerMsg").textContent = err;
      return;
    }

    const createdUser = await res.json();
    localStorage.setItem("shopora_user", JSON.stringify(createdUser));
    document.getElementById("registerMsg").textContent = "✅ Registered successfully!";
    setTimeout(() => window.location.href = "index.html", 1000);
  } catch {
    document.getElementById("registerMsg").textContent = "❌ Error, try again.";
  }
};
</script>
